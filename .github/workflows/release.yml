name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm >= 11.5.1, required for npm Trusted Publishing (OIDC)
          node-version: 24.x
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run build
        run: pnpm turbo run build
      
      - name: Run tests
        run: pnpm turbo run test -- --run
      
      # Authenticates via npm Trusted Publishing (OIDC) — no token required.
      # Configured on npmjs.com: package settings -> Trusted Publisher ->
      # GitHub Actions, repository civicteam/auth-mcp, workflow release.yml
      - name: Publish to npm
        run: |
          cd library
          npm publish --access public --provenance
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Changes in this release:
            - See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details
          draft: false
          prerelease: false